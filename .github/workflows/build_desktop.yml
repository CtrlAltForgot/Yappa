name: Build Yappa Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  YAPPA_VERSION: "1.0.0"

jobs:
  build_linux:
    name: Build Linux (self-hosted)
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          SAFE_VERSION=$(echo "$YAPPA_VERSION" | tr '+' '-')
          echo "version=$YAPPA_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show Flutter version
        shell: bash
        run: flutter --version

      - name: Install client dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd client
          flutter pub get

      - name: Build Linux
        shell: bash
        run: |
          set -euo pipefail
          cd client
          flutter build linux --release

      - name: Package Linux artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION_DIR="client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64"
          ARCHIVE_PATH="client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64.tar.gz"

          rm -rf "$VERSION_DIR" "$ARCHIVE_PATH"
          mkdir -p "$VERSION_DIR"

          cp -R client/build/linux/x64/release/bundle/. "$VERSION_DIR/"
          mkdir -p "$VERSION_DIR/assets"
          cp client/assets/branding/yappa_logo.png "$VERSION_DIR/assets/yappa_logo.png"
          cp client/packaging/linux/run-yappa.sh "$VERSION_DIR/run-yappa.sh"
          chmod +x "$VERSION_DIR/run-yappa.sh"

          printf '%s\n' \
            'Launch Yappa on Linux with ./run-yappa.sh' \
            '' \
            'This artifact is built on the self-hosted Linux runner so it matches the target distro and desktop stack more closely than an Ubuntu-hosted build.' \
            > "$VERSION_DIR/README-Linux.txt"

          tar -C client/dist -czf "$ARCHIVE_PATH" "Yappa-${{ steps.version.outputs.safe_version }}-linux-x64"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-linux-x64
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64.tar.gz

  build_windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          SAFE_VERSION=$(echo "$YAPPA_VERSION" | tr '+' '-')
          echo "version=$YAPPA_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install client dependencies
        shell: bash
        run: |
          cd client
          flutter pub get

      - name: Build Windows
        shell: bash
        run: |
          cd client
          flutter build windows --release

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path client/dist | Out-Null
          Compress-Archive -Path client/build/windows/x64/runner/Release/* -DestinationPath client/dist/Yappa-${{ steps.version.outputs.safe_version }}-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-windows-x64
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-windows-x64.zip

  build_macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          SAFE_VERSION=$(echo "$YAPPA_VERSION" | tr '+' '-')
          echo "version=$YAPPA_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install client dependencies
        shell: bash
        run: |
          cd client
          flutter pub get

      - name: Build macOS
        shell: bash
        run: |
          cd client
          flutter build macos --release

      - name: Package macOS ZIP
        shell: bash
        run: |
          mkdir -p client/dist
          cd client/build/macos/Build/Products/Release
          zip -r ../../../../../dist/Yappa-${{ steps.version.outputs.safe_version }}-macos.zip Yappa.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-macos
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-macos.zip
