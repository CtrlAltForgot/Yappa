name: Build Yappa Desktop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="1.0.0"
          SAFE_VERSION=$(echo $VERSION | tr '+' '-')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "safe_version=$SAFE_VERSION" >> $GITHUB_OUTPUT

      # -------------------------
      # FLUTTER SETUP
      # -------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          cd client
          flutter pub get

      # -------------------------
      # LINUX BUILD
      # -------------------------
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libpipewire-0.3-dev xdg-desktop-portal xdg-desktop-portal-gtk
          cd client
          flutter build linux --release

      - name: Package Linux ZIP
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION_DIR=client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64
          rm -rf "$VERSION_DIR"
          mkdir -p "$VERSION_DIR"

          cp -R client/build/linux/x64/release/bundle/. "$VERSION_DIR"/
          mkdir -p "$VERSION_DIR/assets"
          cp client/assets/branding/yappa_logo.png "$VERSION_DIR/assets/yappa_logo.png"
          cp client/packaging/linux/run-yappa.sh "$VERSION_DIR/run-yappa.sh"
          chmod +x "$VERSION_DIR/run-yappa.sh"

          cat > "$VERSION_DIR/README-Linux.txt" <<'EOF'
          Launch Yappa on Linux with ./run-yappa.sh

          The launcher registers a per-user desktop entry for better portal integration,
          then starts the bundled Yappa binary. This improves screen sharing reliability
          on Linux desktops that rely on xdg-desktop-portal.
          EOF

          cd client/dist
          zip -r Yappa-${{ steps.version.outputs.safe_version }}-linux-x64.zip Yappa-${{ steps.version.outputs.safe_version }}-linux-x64

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-linux-x64
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64.zip

      # -------------------------
      # WINDOWS BUILD
      # -------------------------
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          cd client
          flutter build windows --release

      - name: Package Windows ZIP
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path client/dist
          Compress-Archive `
            -Path client/build/windows/x64/runner/Release/* `
            -DestinationPath client/dist/Yappa-${{ steps.version.outputs.safe_version }}-windows-x64.zip

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-windows-x64
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-windows-x64.zip

      # -------------------------
      # MACOS BUILD
      # -------------------------
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |
          cd client
          flutter build macos --release

      - name: Package macOS ZIP
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p client/dist
          cd client/build/macos/Build/Products/Release
          zip -r ../../../../../dist/Yappa-${{ steps.version.outputs.safe_version }}-macos.zip Yappa.app

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-macos
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-macos.zip
