name: Build Yappa Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="1.0.0"
          SAFE_VERSION="${VERSION//+/-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y             clang             cmake             ninja-build             pkg-config             libgtk-3-dev             libpipewire-0.3-dev             xdg-desktop-portal             xdg-desktop-portal-gtk

      - name: Install dependencies
        shell: bash
        run: |
          cd client
          flutter pub get

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd client
          flutter build linux --release

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION_DIR="client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64"
          rm -rf "$VERSION_DIR"
          mkdir -p "$VERSION_DIR"

          cp -R client/build/linux/x64/release/bundle/. "$VERSION_DIR"/
          mkdir -p "$VERSION_DIR/assets"
          cp client/assets/branding/yappa_logo.png "$VERSION_DIR/assets/yappa_logo.png"
          cp client/packaging/linux/run-yappa.sh "$VERSION_DIR/run-yappa.sh"
          chmod +x "$VERSION_DIR/run-yappa.sh"

          python3 - <<'PY'
          from pathlib import Path
          path = Path("client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64/README-Linux.txt")
          path.write_text(
              "Launch Yappa on Linux with ./run-yappa.sh\n\n"
              "The launcher does three important things on every start:\n"
              "1. Registers a per-user desktop entry for Yappa\n"
              "2. Imports DISPLAY / WAYLAND_DISPLAY / XDG_CURRENT_DESKTOP into the D-Bus activation environment\n"
              "3. Starts Yappa with GTK_USE_PORTAL=1\n\n"
              "On Linux, the screen-share picker is provided by xdg-desktop-portal.\n"
              "When portal integration is working, the user simply approves the share target in the desktop dialog.\n\n"
              "If screen sharing still fails, the host system is usually missing a working ScreenCast portal backend\n"
              "for the current desktop session.\n",
              encoding="utf-8",
          )
          PY

          cd client/dist
          tar -czf "Yappa-${{ steps.version.outputs.safe_version }}-linux-x64.tar.gz" "Yappa-${{ steps.version.outputs.safe_version }}-linux-x64"

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-linux-x64
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64.tar.gz

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd client
          flutter build windows --release

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path client/dist | Out-Null
          Compress-Archive `
            -Path client/build/windows/x64/runner/Release/* `
            -DestinationPath client/dist/Yappa-${{ steps.version.outputs.safe_version }}-windows-x64.zip `
            -Force

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-windows-x64
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-windows-x64.zip

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd client
          flutter build macos --release

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p client/dist
          cd client/build/macos/Build/Products/Release
          zip -r ../../../../../dist/Yappa-${{ steps.version.outputs.safe_version }}-macos.zip Yappa.app

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-macos
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-macos.zip
