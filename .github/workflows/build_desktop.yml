name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - client
    tags:
      - 'v*'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: meta
        run: |
          version=$(grep '^version:' pubspec.yaml | head -n1 | sed 's/^version:[[:space:]]*//')
          if [ -z "$version" ]; then
            version="0.0.0+0"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_safe=${version//+/\-}" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake curl file fuse libgtk-3-dev liblzma-dev ninja-build pkg-config

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Install linuxdeploy
        uses: miurahr/install-linuxdeploy-action@v1
        with:
          plugins: appimage

      - name: Package AppImage
        run: |
          mkdir -p dist
          APPDIR="$RUNNER_TEMP/Yappa.AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -r build/linux/x64/release/bundle/* "$APPDIR/usr/bin/"
          cp macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png "$APPDIR/yappa.png"

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Yappa" "$@"
          EOF
          sed -i 's/^          //' "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/Yappa.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Yappa
          Exec=Yappa
          Icon=yappa
          Categories=Network;Chat;
          Terminal=false
          StartupNotify=true
          EOF
          sed -i 's/^          //' "$APPDIR/Yappa.desktop"

          linuxdeploy \
            --appdir "$APPDIR" \
            --desktop-file "$APPDIR/Yappa.desktop" \
            --icon-file "$APPDIR/yappa.png" \
            --output appimage

          mv ./*.AppImage "dist/Yappa-${{ steps.meta.outputs.version_safe }}-linux-x64.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: yappa-linux-appimage
          path: client/dist/Yappa-${{ steps.meta.outputs.version_safe }}-linux-x64.AppImage
          if-no-files-found: error

  build-windows:
    name: Build Windows Setup EXE
    runs-on: windows-latest

    defaults:
      run:
        working-directory: client
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: meta
        run: |
          version=$(grep '^version:' pubspec.yaml | head -n1 | sed 's/^version:[[:space:]]*//')
          if [ -z "$version" ]; then
            version="0.0.0+0"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_safe=${version//+/\-}" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Ensure dist directory exists
        run: mkdir -p dist

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: client/packaging/windows/yappa.iss
          options: >-
            /DMyAppVersion=${{ steps.meta.outputs.version }}
            /DMyOutputBaseFilename=Yappa-Setup-${{ steps.meta.outputs.version_safe }}-windows-x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: yappa-windows-installer
          path: client/dist/Yappa-Setup-${{ steps.meta.outputs.version_safe }}-windows-x64.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    defaults:
      run:
        working-directory: client
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: meta
        run: |
          version=$(grep '^version:' pubspec.yaml | head -n1 | sed 's/^version:[[:space:]]*//')
          if [ -z "$version" ]; then
            version="0.0.0+0"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_safe=${version//+/\-}" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package DMG
        run: |
          mkdir -p dist
          STAGE="$RUNNER_TEMP/yappa-dmg"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R build/macos/Build/Products/Release/Yappa.app "$STAGE/"
          hdiutil create \
            -volname "Yappa" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "dist/Yappa-${{ steps.meta.outputs.version_safe }}-macos.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: yappa-macos-dmg
          path: client/dist/Yappa-${{ steps.meta.outputs.version_safe }}-macos.dmg
          if-no-files-found: error
