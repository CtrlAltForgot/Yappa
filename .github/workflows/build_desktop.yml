name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - client

jobs:
  build-linux:
    name: Build Linux single-file package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          APP_VERSION=$(grep '^version:' client/pubspec.yaml | awk '{print $2}')
          SAFE_VERSION=${APP_VERSION//+/-}
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev zip makeself

      - name: Enable Linux desktop
        working-directory: client
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Linux release
        working-directory: client
        run: flutter build linux --release

      - name: Package Linux .run installer
        shell: bash
        run: |
          mkdir -p client/dist
          rm -rf client/dist/linux-package
          mkdir -p client/dist/linux-package
          cp -r client/build/linux/x64/release/bundle/* client/dist/linux-package/
          makeself --nox11 \
            client/dist/linux-package \
            client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64.run \
            "Yappa ${{ steps.version.outputs.app_version }}" \
            ./yappa

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-linux-x64
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-linux-x64.run
          if-no-files-found: error

  build-windows:
    name: Build Windows Setup EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $line = (Get-Content client/pubspec.yaml | Where-Object { $_ -match '^version:' } | Select-Object -First 1)
          $appVersion = $line.Split(':')[1].Trim()
          $safeVersion = $appVersion.Replace('+', '-')
          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "safe_version=$safeVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        working-directory: client
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Windows release
        working-directory: client
        run: flutter build windows --release

      - name: Ensure dist directory exists
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path client/dist | Out-Null

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: client/packaging/windows/yappa.iss

      - name: Rename installer
        shell: pwsh
        run: |
          $source = "client/dist/Yappa-Setup.exe"
          if (!(Test-Path $source)) {
            throw "Expected installer not found at $source"
          }
          $target = "client/dist/Yappa-Setup-${{ steps.version.outputs.safe_version }}-windows-x64.exe"
          Move-Item -Force $source $target

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-windows-x64
          path: client/dist/Yappa-Setup-${{ steps.version.outputs.safe_version }}-windows-x64.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          APP_VERSION=$(grep '^version:' client/pubspec.yaml | awk '{print $2}')
          SAFE_VERSION=${APP_VERSION//+/-}
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable macOS desktop
        working-directory: client
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build macOS release
        working-directory: client
        run: flutter build macos --release

      - name: Package DMG
        shell: bash
        run: |
          mkdir -p client/dist/dmg-root
          rm -rf client/dist/dmg-root/*
          cp -R client/build/macos/Build/Products/Release/yappa.app client/dist/dmg-root/
          hdiutil create \
            -volname "Yappa" \
            -srcfolder client/dist/dmg-root \
            -ov \
            -format UDZO \
            client/dist/Yappa-${{ steps.version.outputs.safe_version }}-macos.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yappa-macos
          path: client/dist/Yappa-${{ steps.version.outputs.safe_version }}-macos.dmg
          if-no-files-found: error
