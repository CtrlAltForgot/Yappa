name: yappa
description: "An open source, self hosted, next-generation social platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  http: ^1.2.2
  socket_io_client: ^3.1.1
  file_picker: ^10.3.9
  desktop_drop: ^0.6.1
  url_launcher: ^6.3.0
  record: ^6.2.0
  flutter_webrtc: 1.3.0
  livekit_client: ^2.6.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true